name: npm

on:
  schedule:
    - cron: 0 0 1 * *
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/npm.yml

jobs:
  build:

    runs-on: ubuntu-20.04

    steps:
    - uses: actions/checkout@v2
    - uses: actions/setup-node@v2
      with:
        node-version: 16
    - run: npm ci
    - run: npm run build --if-present
    - run: npm test
